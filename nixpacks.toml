[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = ["pip install -r 'Back_end/Clinical Decision Support System - cintana/requirements.txt'"]

[start]
cmd = "cd 'Back_end/Clinical Decision Support System - cintana' && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2"
